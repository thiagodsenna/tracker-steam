<!DOCTYPE html>
<html lang="pt-br" class="bg-neutral-950 text-neutral-200">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <style>
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-modal { animation: fadeIn 0.3s ease-out forwards; }
        .game-header-text { text-shadow: 0 2px 4px rgba(0,0,0,0.7); }
    </style>
</head>
<body class="p-4 sm:p-6 min-h-screen selection:bg-emerald-500/30">
    
    <div id="lightbox" onclick="fecharLightbox()" class="fixed inset-0 z-[100] bg-black/95 hidden flex justify-center items-center">
        <img id="lightbox-img" class="max-w-[95%] max-h-[95%] object-contain cursor-pointer">
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-neutral-800 pb-4">
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight">Release<span class="text-emerald-500">Tracker</span></h1>
                <p class="text-xs text-neutral-500 mt-1">Lançamentos de jogos da scene</p>
            </div>
            <button onclick="carregarJogos()" class="bg-neutral-900 hover:bg-neutral-800 border border-neutral-800 text-neutral-300 px-4 py-2 rounded-xl text-sm font-semibold transition-colors">
                Atualizar
            </button>
        </header>

        <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
            <div class="col-span-full text-center py-20 text-emerald-500 animate-pulse">Carregando lançamentos...</div>
        </div>
    </div>

    <div id="modal-overlay" onclick="fecharModalFora(event)" class="fixed inset-0 z-50 bg-black/85 backdrop-blur-md hidden overflow-y-auto">
        <div class="min-h-full w-full flex items-center justify-center p-0 sm:p-6">
            <div id="modal-content" class="bg-neutral-900 border border-neutral-800 w-full max-w-4xl min-h-[80vh] sm:rounded-3xl overflow-hidden flex flex-col shadow-2xl relative animate-modal my-0 sm:my-8">
                
                <div id="modal-hero" class="h-48 sm:h-64 w-full bg-neutral-800 bg-cover bg-center relative flex items-end p-8">
                    <div class="absolute inset-0 bg-gradient-to-t via-neutral-900/40 to-transparent"></div>
                    <button onclick="fecharModal()" class="absolute top-4 right-4 bg-black/50 hover:bg-black/80 text-white p-2 rounded-full backdrop-blur-sm z-10">✕</button>
                    <h2 id="modal-title-original" class="text-4xl font-bold text-white relative z-0 game-header-text" style="display:none">Carregando...</h2>
                    <div id="modal-metacritic-score" class="absolute bottom-4 right-4 hidden h-16 w-16 flex items-center justify-center rounded-lg border-2 border-white/20 shadow-xl">
                        <span id="metacritic-score-value" class="text-2xl font-black text-white"></span>
                    </div>
                </div>
                <div class="p-5 sm:p-8 space-y-7">
                    <div class="flex flex-row items-start gap-4">
                        <div class="w-32 sm:w-32 bg-neutral-950 rounded-lg overflow-hidden shrink-0 border border-neutral-800 shadow-2xl">
                            <img id="modal-cover" src="" class="w-full h-full object-cover">
                        </div>
                        <div class="flex-1 space-y-4">
                            <div class="bg-neutral-950/50 p-4 rounded-xl border border-neutral-800">
                                <h3 id="modal-title-release" class="text-sm font-bold text-white mb-3 underline decoration-emerald-500/50"></h3>
                                <div id="steam-metadata" class="text-xs text-neutral-400 space-y-1 hidden">
                                    <p id="release-date"></p>
                                    <p id="modal-genres"></p>
                                    <p id="modal-developer"></p>
                                </div>
                            </div>
                            <a id="modal-btn-skidrow" href="#" target="_blank" class="inline-block bg-emerald-500 hover:bg-emerald-600 text-neutral-950 font-bold text-xs px-4 py-2 rounded-lg transition-colors">Post Original</a>
                        </div>
                    </div>
                    
                    <div id="modal-section-screenshots" class="hidden space-y-3">
                        <h4 class="text-xs font-bold text-neutral-400 uppercase tracking-widest border-b border-neutral-800 pb-2">Screenshots</h4>
                        <div id="modal-screenshots-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-4"></div>
                    </div>

                    <div id="modal-section-recursos" class="hidden space-y-3">
                        <h4 class="text-xs font-bold text-neutral-400 uppercase tracking-widest border-b border-neutral-800 pb-2">Recursos</h4>
                        <div id="modal-recursos-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-2"></div>
                    </div>


                    <div id="modal-section-videos" class="hidden space-y-3">
                        <h4 class="text-xs font-bold text-neutral-400 uppercase tracking-widest border-b border-neutral-800 pb-2">Vídeos</h4>
                        <div id="modal-youtube-container"></div>
                    </div>

                    <div class="space-y-3">
                        <h4 class="text-xs font-bold text-neutral-400 uppercase tracking-widest border-b border-neutral-800 pb-2">Descrição</h4>
                        <div id="modal-description" class="text-sm text-neutral-300"></div>
                    </div>

                    <div class="space-y-3 pb-8">
                        <h4 class="text-xs font-bold text-neutral-400 uppercase tracking-widest border-b border-neutral-800 pb-2">Links de Download</h4>
                        <div id="modal-downloads-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let jogosCarregados = [];
        const STREAM_ID = 'feed%2Fhttps%3A%2F%2Fwww.skidrowreloaded.com%2Fcategory%2Fpc-games%2Ffeed%2F';
        const PROXY_BASE_URL = 'https://tracker-steam.vercel.app/api/steam-proxy?appid='; 
        const CATEGORY_ICONS = {
            1: 'ico_multiPlayer.png',
            2: 'ico_singlePlayer.png',
            8: 'ico_vac.png',
            9: 'ico_coop.png',
            13: 'ico_captions.png',
            14: 'ico_commentary.png',
            15: 'ico_stats.png',
            17: 'ico_editor.png',
            18: 'ico_partial_controller.png',
            20: 'ico_mmo.png',
            22: 'ico_achievements.png',
            23: 'ico_cloud.png',
            24: 'ico_multiPlayer.png',
            25: 'ico_leaderboards.png',
            27: 'ico_multiPlayer.png',
            28: 'ico_controller.png',
            29: 'ico_cards.png',
            30: 'ico_workshop.png',
            31: 'ico_vr.png',
            32: 'ico_multiPlayer.png',
            35: 'ico_cart.png',
            36: 'ico_pvp.png',
            37: 'ico_pvp.png',
            38: 'ico_coop.png',
            39: 'ico_coop.png',
            41: 'ico_remote_play.png',
            42: 'ico_remote_play.png',
            43: 'ico_remote_play.png',
            44: 'ico_remote_play_together.png',
            47: 'ico_pvp.png',
            48: 'ico_coop.png',
            49: 'ico_pvp.png',
            51: 'ico_workshop.png',
            61: 'ico_hdr.png'
        };


        const delay = ms => new Promise(res => setTimeout(res, ms));

        function getMetacriticColor(score) {
            if (score >= 81) return { bg: 'bg-green-600', border: 'border-green-400' };
            if (score >= 71) return { bg: 'bg-yellow-500', border: 'border-yellow-300' };
            if (score >= 51) return { bg: 'bg-yellow-600', border: 'border-yellow-400' };
            if (score >= 31) return { bg: 'bg-orange-500', border: 'border-orange-300' };
            return { bg: 'bg-red-600', border: 'border-red-400' };
        }

        async function carregarJogos() {
            const grid = document.getElementById('grid');
            jogosCarregados = [];
            grid.innerHTML = '<div class="col-span-full text-center py-20 text-emerald-500 animate-pulse">Carregando lançamentos...</div>';
            
            try {
                const res = await fetch('/api/feedly-proxy');
                const data = await res.json();
                
                grid.innerHTML = '';
                
                data.items.forEach((item, index) => {
                    const doc = new DOMParser().parseFromString(item.content?.content || item.summary?.content || '', 'text/html');
                    const img = item.visual?.url || doc.querySelector('img')?.src || '';
                    
                    let downloads = [];
                    doc.querySelectorAll('a').forEach(a => {
                        const href = a.href || '';
                        if(href.includes('skidrowreloaded') || href.includes('steampowered') || href.includes('youtube')) return;
                        if(a.textContent.length > 2 && downloads.length < 16) {
                            let label = href.startsWith('magnet:') ? 'TORRENT' : new URL(a.href).hostname.replace('www.', '').toUpperCase().split('.')[0];
                            downloads.push({label: label, url: a.href});
                        }
                    });

                    const steamMatch = item.content?.content?.match(/store\.steampowered\.com\/app\/(\d+)/);
                    const steamId = steamMatch ? steamMatch[1] : null;

                    jogosCarregados.push({ 
                        id: index, 
                        title: item.title, 
                        cover: img, 
                        postLink: item.alternate?.[0]?.href || '#', 
                        downloads, 
                        date: new Date(item.published).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' }),
                        steamId: steamId 
                    });

                    const card = document.createElement('div');
                    card.className = 'bg-neutral-900 border border-neutral-800 rounded-xl overflow-hidden cursor-pointer relative hover:border-emerald-500/50 transition-all';
                    card.onclick = () => abrirModal(index);
                    card.innerHTML = `
                        <div class="aspect-[3/4] bg-neutral-950">
                            <img src="${item.visual?.url}" referrerpolicy="no-referrer" class="w-full h-full object-cover">
                        </div>
                        <div id="score-${index}" class="absolute top-2 right-2 bg-black/70 backdrop-blur px-2 py-1 rounded text-[10px] font-bold text-emerald-400 hidden"></div>
                        <div class="p-3 font-bold text-xs line-clamp-2">${item.title}</div>
                    `;
                    grid.appendChild(card);
                });
                //carregarNotasEmLote();
            } catch (err) { 
                console.error("Erro Feedly:", err);
                grid.innerHTML = `<div class="col-span-full text-red-500 text-center py-20">Erro ao carregar feeds.</div>`; 
            }
        }

        async function carregarNotasEmLote() {
            const steamIds = jogosCarregados.map(j => j.steamId).filter(id => id !== null);
            if (steamIds.length === 0) return;
        
            try {
                // Chamada única para o novo endpoint batch
                const res = await fetch('/api/steam-batch?ids=' + steamIds.join(','));
                const json = await res.json();
        
                jogosCarregados.forEach((jogo, index) => {
                    if (jogo.steamId && json[jogo.steamId]?.success) {
                        const game = json[jogo.steamId].data;
                        const score = game.metacritic?.score;
                        
                        if (score) {
                            const el = document.getElementById(`score-${index}`);
                            if (el) {
                                const { bg, border } = getMetacriticColor(score);
                                el.textContent = score;
                                el.className = `absolute top-2 right-2 ${bg} border ${border} px-2 py-1 rounded text-[10px] font-black text-white shadow-lg`;
                            }
                        }
                    }
                });
            } catch (e) { console.error("Erro ao buscar notas em lote", e); }
        }

        window.abrirLightbox = (src) => { 
            document.getElementById('lightbox-img').src = src; 
            document.getElementById('lightbox').classList.remove('hidden'); 
        };
        function fecharLightbox() { document.getElementById('lightbox').classList.add('hidden'); }

        async function abrirModal(id) {
            // Adiciona um estado ao histórico para capturar o "Voltar"
            history.pushState({modalOpen: true}, '', window.location.href);
            
            const jogo = jogosCarregados[id];
            if (!jogo) return;
            
            document.getElementById('modal-title-original').textContent = jogo.title;
            document.getElementById('modal-title-release').textContent = jogo.title;
            document.getElementById('modal-cover').src = jogo.cover;
            document.getElementById('modal-hero').style.backgroundImage = 'none';
            document.getElementById('modal-btn-skidrow').href = jogo.postLink;
            document.getElementById('modal-description').textContent = 'Buscando informações da Steam...';
            
            document.getElementById('steam-metadata').classList.add('hidden');
            document.getElementById('modal-section-screenshots').classList.add('hidden');
            document.getElementById('modal-section-recursos').classList.add('hidden');
            document.getElementById('modal-section-videos').classList.add('hidden');

            const metaScoreEl = document.getElementById('modal-metacritic-score');
            metaScoreEl.className = 'absolute bottom-4 right-4 hidden h-16 w-16 flex items-center justify-center rounded-lg border-2 border-white/20 shadow-xl';
            document.getElementById('metacritic-score-value').textContent = '';
            document.getElementById('modal-downloads-grid').innerHTML = jogo.downloads.map(dl => `
                <a href="${dl.url}" target="_blank" class="bg-neutral-800 hover:bg-neutral-700 p-2 flex items-center gap-2 rounded text-xs font-bold text-neutral-300 border border-neutral-700">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    ${dl.label}
                </a>`).join('');
            
            document.getElementById('modal-overlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            
            if (jogo.steamId) {
                buscarDadosSteam(jogo.steamId);
            } else {
                document.getElementById('modal-description').textContent = "Sem ID Steam detectado no post original.";
            }
        }

        async function buscarDadosSteam(steamId) {
        await delay(1);
        try {
            const res = await fetch(PROXY_BASE_URL + steamId);
            const json = await res.json();
            const game = json[steamId]?.data;
            
            if (!game) throw new Error("Sem dados");
    
            // Nome e Banner
            document.getElementById('modal-title-original').textContent = game.name;
            if(game.header_image) document.getElementById('modal-hero').style.backgroundImage = `url('${game.header_image}')`;
            
            // Metadata e Metacritic
            document.getElementById('steam-metadata').classList.remove('hidden');
            document.getElementById('release-date').innerHTML = `<span class="text-neutral-500">Lançamento:</span> ${game.release_date.date}`;
            document.getElementById('modal-genres').innerHTML = `<span class="text-neutral-500">Gêneros:</span> ${game.genres.map(g => g.description).join(', ')}`;
            document.getElementById('modal-developer').innerHTML = `<span class="text-neutral-500">Desenvolvedor:</span> ${game.developers.join(', ')}`;
            
            // Metacritic (Nota) - Badge no cabeçalho
            if (game.metacritic) {
                const { bg, border } = getMetacriticColor(game.metacritic.score);
                const metaScoreEl = document.getElementById('modal-metacritic-score');
                metaScoreEl.className = `absolute bottom-4 right-4 h-16 w-16 flex flex-col items-center justify-center rounded-lg border-2 ${border} ${bg} shadow-xl`;
                document.getElementById('metacritic-score-value').textContent = game.metacritic.score;

                const metaEl = document.createElement('p');
                metaEl.dataset.meta = 'metacritic';
                metaEl.innerHTML = `<span class="text-neutral-500">Metacritic:</span> ${game.metacritic.score}/100`;
                document.getElementById('steam-metadata').appendChild(metaEl);
            }
    
            document.getElementById('modal-description').innerHTML = game.detailed_description || game.short_description || "Sem descrição disponível.";
    
            // Screenshots (Todas)
            if(game.screenshots && game.screenshots.length > 0) {
                document.getElementById('modal-section-screenshots').classList.remove('hidden');
                document.getElementById('modal-screenshots-grid').innerHTML = game.screenshots.map(s => 
                    `<img src="${s.path_thumbnail}" referrerpolicy="no-referrer" onclick="abrirLightbox('${s.path_full}')" class="rounded border border-neutral-800 cursor-pointer hover:opacity-80">`
                ).join('');
            }

            // Recursos (Categorias)
            if(game.categories && game.categories.length > 0) {
                document.getElementById('modal-section-recursos').classList.remove('hidden');
                document.getElementById('modal-recursos-grid').innerHTML = game.categories.map(c => {
                    const iconName = CATEGORY_ICONS[c.id] || 'ico_singlePlayer.png'; // Fallback
                    const iconUrl = `https://store.fastly.steamstatic.com/public/images/v6/ico/${iconName}`;
                    
                    return `
                    <div class="bg-neutral-800 p-2 flex items-center gap-2 rounded text-xs font-bold text-neutral-300 border border-neutral-700">
                        <img src="${iconUrl}" class="w-6 h-4">
                        <span class="truncate">${c.description}</span>
                    </div>`;
                }).join('');
            }
    
            // Trailers (Todos)
            if(game.movies && game.movies.length > 0) {
                document.getElementById('modal-section-videos').classList.remove('hidden');
                const container = document.getElementById('modal-youtube-container');
                container.innerHTML = ''; // Limpa container
            
                game.movies.forEach((m, idx) => {
                    // Prioriza MP4, depois HLS (.m3u8), depois DASH (.mpd)
                    const src = m.dash_av1 || m.dash_h264 || m.hls_h264;
                    const type = src.includes('.m3u8') ? 'application/x-mpegURL' : 
                                 src.includes('.mpd') ? 'application/dash+xml' : 
                                 'video/mp4';
            
                    const videoId = `vjs-player-${idx}`;
                    container.innerHTML += `
                        <div class="mb-4">
                            <div class="aspect-video w-full !h-full">
                                <video id="${videoId}" class="video-js vjs-default-skin w-full !h-full" controls preload="auto" poster="${m.thumbnail}">
                                <source src="${src}" type="${type}">
                            </video>
                            </div>
                            ${m.name ? `<div class="bg-black text-neutral-400 text-xs font-bold uppercase tracking-widest px-3 py-2">${m.name}</div>` : ''}
                        </div>`;
                    
                    // Inicializa o player Video.js para este vídeo
                    // Aguarda o próximo ciclo do DOM para inicializar
                    setTimeout(() => {
                        if (window.videojs) {
                            videojs(videoId);
                        }
                    }, 1);
                });
            }
            
        } catch(e) { 
            console.error("Erro na busca Steam:", e); 
            document.getElementById('modal-description').textContent = "Erro ao buscar dados na Steam.";
        }
    }

        function fecharModal() { 
            // Destroi todos os players ativos do Video.js antes de fechar
            if (window.videojs) {
                const players = videojs.getAllPlayers();
                players.forEach(player => player.dispose());
            }

            // Se o modal foi aberto pelo pushState, volta o histórico para limpar
            if (history.state && history.state.modalOpen) {
                history.back();
            }
            
            document.body.style.overflow = ''; 
            document.getElementById('modal-overlay').classList.add('hidden'); 
        }
        function fecharModalFora(e) { if (e.target.id === 'modal-overlay') fecharModal(); }
        
        carregarJogos();

        window.addEventListener('popstate', () => {
            const modal = document.getElementById('modal-overlay');
            // Se o modal estiver aberto, fecha sem navegar para fora da página
            if (modal && !modal.classList.contains('hidden')) {
                fecharModal();
            }
        });
    </script>
</body>
</html>
