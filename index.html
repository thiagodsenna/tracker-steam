<!DOCTYPE html>
<html lang="pt-br" class="bg-neutral-950 text-neutral-200">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css">
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

</head>
<body class="p-4 sm:p-6 min-h-screen selection:bg-emerald-500/30">
    
    <!-- 1. Importe as fontes no <head> do seu HTML -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Outfit:wght@700&family=Rajdhani:wght@700&family=Space+Grotesk:wght@700&family=Syne:wght@800&display=swap" rel="stylesheet">

    <style>
        /* 2. Classes utilitárias para testar no Tailwind */
        .font-rajdhani { font-family: 'Rajdhani', sans-serif; }
        .font-space { font-family: 'Space Grotesk', sans-serif; }
        .font-chakra { font-family: 'Chakra Petch', sans-serif; }
        .font-outfit { font-family: 'Outfit', sans-serif; }
        .font-syne { font-family: 'Syne', sans-serif; }
    </style>
    
    <div id="lightbox" onclick="fecharLightbox()" class="fixed inset-0 z-[100] bg-black/95 hidden flex justify-center items-center">
        <img id="lightbox-img" class="max-w-[95%] max-h-[95%] object-contain cursor-pointer">
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-row justify-between items-center gap-2 sm:gap-4 mb-8 border-b border-neutral-800 pb-4">
            <div class="shrink-0">
                <h1 class="text-xl sm:text-2xl font-bold text-white tracking-tight">Release<span class="text-emerald-500">Tracker</span></h1>
                <p class="hidden sm:block text-xs text-neutral-500 mt-1">Lançamentos de jogos da scene</p>
            </div>
            
            <div class="flex items-center gap-1.5 sm:gap-3 flex-1 justify-end min-w-0">
                <div class="flex items-center bg-neutral-900 border border-neutral-800 p-1 rounded-xl shrink-0">
                    <button id="btn-view-covers" onclick="setViewMode('covers')" class="p-1.5 sm:p-2 rounded-lg transition-colors text-neutral-400 hover:text-white" title="Visualização em Capas (Covers)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sm:w-[18px] sm:h-[18px]"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
                    </button>
                    <button id="btn-view-compact" onclick="setViewMode('compact')" class="p-1.5 sm:p-2 rounded-lg transition-colors text-neutral-400 hover:text-white" title="Visualização Compacta (Compact)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sm:w-[18px] sm:h-[18px]"><line x1="8" x1="21" y1="6" y2="6"/><line x1="8" x1="21" y1="12" y2="12"/><line x1="8" x1="21" y1="18" y2="18"/><line x1="3" x1="3.01" y1="6" y2="6"/><line x1="3" x1="3.01" y1="12" y2="12"/><line x1="3" x1="3.01" y1="18" y2="18"/></svg>
                    </button>
                </div>
                
                <div class="relative flex-1 min-w-[110px] max-w-xs sm:w-64">
                    <input type="text" id="search-input" placeholder="Pesquisa" class="w-full bg-neutral-900 border border-neutral-800 text-neutral-300 pl-8 pr-3 py-1.5 sm:py-2 rounded-xl text-xs sm:text-sm focus:outline-none focus:border-emerald-500/50 transition-colors">
                    <div class="absolute inset-y-0 left-0 pl-2.5 flex items-center pointer-events-none text-neutral-500">
                        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sm:w-3.5 sm:h-3.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    </div>
                </div>
            </div>
        </header>

        <!-- Tag de filtro de pesquisa -->
        <div id="search-filter-tag" class="hidden w-full bg-neutral-900 border border-neutral-800 rounded-xl p-3 mb-6 flex items-center justify-between text-xs sm:text-sm font-semibold">
            <div class="flex items-center gap-2 sm:gap-3 flex-wrap text-neutral-400">
                <span>Filtrado por: <span id="search-term-text" class="text-white font-bold">""</span></span>
                <span class="text-neutral-700">|</span>
                <button id="btn-filter-feedly" class="px-3 py-1 rounded-lg border border-emerald-500/30 bg-emerald-500/10 text-emerald-400 font-bold transition-all">
                    Feedly
                </button>
                <button id="btn-filter-steam" class="px-3 py-1 rounded-lg border border-neutral-800 bg-neutral-950 text-neutral-400 hover:text-white transition-all">
                    Steam
                </button>
            </div>
            <button id="btn-clear-search" class="text-neutral-400 hover:text-white px-2 py-1 font-bold text-base transition-colors" title="Limpar busca">
                ✕
            </button>
        </div>

        <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
            <div class="col-span-full text-center py-20 text-emerald-500 animate-pulse">Carregando lançamentos...</div>
        </div>
    </div>

    <div id="modal-overlay" onclick="fecharModalFora(event)" class="fixed inset-0 z-50 bg-black/85 backdrop-blur-md hidden overflow-y-auto">
        <div class="min-h-full w-full flex items-center justify-center p-0 sm:p-6">
            <div id="modal-content" class="bg-neutral-900 border border-neutral-800 w-full max-w-4xl minh-[80vh] sm:rounded-3xl overflow-hidden flex flex-col shadow-2xl relative animate-modal my-0 sm:my-8">
                
                <div id="modal-hero" class="h-48 sm:h-64 w-full bg-neutral-800 bg-cover bg-center relative flex items-end p-8">
                    <div class="absolute inset-0 bg-gradient-to-t via-neutral-900/40 to-transparent"></div>
                    <button onclick="fecharModal()" class="absolute top-4 right-4 bg-black/50 hover:bg-black/80 text-white p-2 rounded-full backdrop-blur-sm z-10">✕</button>
                    <h2 id="modal-title-original" class="text-4xl font-bold text-white relative z-0 game-header-text" style="display:none">Carregando...</h2>
                    <div id="modal-metacritic-score" class="absolute bottom-4 right-4 hidden h-16 w-16 flex items-center justify-center rounded-lg border-2 border-white/20 shadow-xl">
                        <span id="metacritic-score-value" class="text-2xl font-black text-white"></span>
                    </div>
                </div>
                <div class="p-5 sm:p-8 space-y-7">
                    <div class="flex flex-row items-start gap-4">
                        <div class="w-32 sm:w-32 bg-neutral-950 rounded-lg overflow-hidden shrink-0 border border-neutral-800 shadow-2xl">
                            <img id="modal-cover" src="" class="w-full h-full object-cover">
                        </div>
                        <div class="flex-1 space-y-4">
                            <div class="bg-neutral-950/50 p-4 rounded-xl border border-neutral-800">
                                <h3 id="modal-title-release" class="text-sm font-bold text-white mb-3"></h3>
                                <div id="steam-metadata" class="text-xs text-neutral-400 space-y-1 hidden">
                                    <p id="game-size"></p>
                                    <p id="release-date"></p>
                                    <p id="total-reviews"></p>
                                    <p id="modal-genres"></p>
                                    <p id="modal-developer"></p>
                                </div>
                            </div>
                            <button id="modal-btn-share" type="button" class="inline-flex items-center gap-1.5 bg-emerald-500 hover:bg-emerald-600 text-neutral-950 font-bold text-xs px-4 py-2 rounded-lg transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                                Compartilhar
                            </button>
                        </div>
                    </div>

                    <div id="modal-section-hltb" class="hidden space-y-3">
                        <h4 class="text-xs font-bold text-neutral-400 uppercase tracking-widest border-b border-neutral-800 pb-2 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            How Long to Beat
                        </h4>
                        <div id="modal-hltb-grid" class="bg-neutral-950/60 border border-neutral-800/80 rounded-xl p-4 sm:p-5 space-y-4 shadow-inner"></div>
                    </div>
                    
                    <div class="space-y-3">
                        <h4 class="text-xs font-bold text-neutral-400 uppercase tracking-widest border-b border-neutral-800 pb-2">Descrição</h4>
                        <div id="modal-description" class="text-[12px] text-neutral-400 [&_p:my-[15px] [&_img]:my-[15px]"></div>
                    </div>

                    <div id="modal-section-recursos" class="hidden space-y-3">
                        <h4 class="text-xs font-bold text-neutral-400 uppercase tracking-widest border-b border-neutral-800 pb-2">Recursos</h4>
                        <div id="modal-recursos-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-2"></div>
                    </div>

                    <div id="modal-section-screenshots" class="hidden space-y-3">
                        <h4 class="text-xs font-bold text-neutral-400 uppercase tracking-widest border-b border-neutral-800 pb-2">Screenshots</h4>
                        <div id="modal-screenshots-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-4"></div>
                    </div>

                    <div id="modal-section-videos" class="hidden space-y-3">
                        <h4 class="text-xs font-bold text-neutral-400 uppercase tracking-widest border-b border-neutral-800 pb-2">Vídeos</h4>
                        <div id="modal-youtube-container"></div>
                    </div>

                    <div id="modal-section-reviews" class="hidden space-y-3">
                        <h4 class="text-xs font-bold text-neutral-400 uppercase tracking-widest border-b border-neutral-800 pb-2">Avaliações (Steam)</h4>
                        <div id="modal-reviews-list" class="space-y-4"></div>
                    </div>

                    <div class="space-y-3 pb-8">
                        <h4 class="text-xs font-bold text-neutral-400 uppercase tracking-widest border-b border-neutral-800 pb-2">Links</h4>
                        <div id="modal-links-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-2"></div>
                    </div>

                    <div class="space-y-3 pb-8">
                        <h4 class="text-xs font-bold text-neutral-400 uppercase tracking-widest border-b border-neutral-800 pb-2">Download</h4>
                        <div id="modal-downloads-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="scripts.js"></script>

</body>

</html>
