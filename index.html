<!DOCTYPE html>
<html lang="pt-br" class="bg-neutral-950 text-neutral-200">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="./assets/logo2.png">
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    
    <!-- Conexão com o Manifest (Android / Chrome) -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <!-- Suporte específico para iOS (Safari) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ReleasesTracker">
    <link rel="apple-touch-icon" href="/assets/logo2.png">

</head>
<body class="p-4 sm:p-6 min-h-screen selection:bg-emerald-500/30">
    
    <!-- 1. Importe as fontes no <head> do seu HTML -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Outfit:wght@700&family=Rajdhani:wght@700&family=Space+Grotesk:wght@700&family=Syne:wght@800&display=swap" rel="stylesheet">

    <style>
        /* 2. Classes utilitárias para testar no Tailwind */
        .font-rajdhani { font-family: 'Rajdhani', sans-serif; }
        .font-space { font-family: 'Space Grotesk', sans-serif; }
        .font-chakra { font-family: 'Chakra Petch', sans-serif; }
        .font-outfit { font-family: 'Outfit', sans-serif; }
        .font-syne { font-family: 'Syne', sans-serif; }
    </style>
    
    <div id="lightbox" onclick="fecharLightbox()" class="fixed inset-0 z-[100] bg-black/95 hidden flex justify-center items-center">
        <img id="lightbox-img" class="max-w-[95%] max-h-[95%] object-contain cursor-pointer">
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-row justify-between items-center gap-2 sm:gap-4 mb-8 border-b border-neutral-800 pb-4">
            <div class="shrink-0">
                <h1 class="text-xl sm:text-2xl font-bold text-white tracking-tight">Release<span class="text-emerald-500">Tracker</span></h1>
                <p class="hidden sm:block text-xs text-neutral-500 mt-1">Lançamentos de jogos da scene</p>
            </div>
            
            <div class="flex items-center gap-1.5 sm:gap-3 flex-1 justify-end min-w-0">
                <div class="flex items-center bg-neutral-900 border border-neutral-800 p-1 rounded-xl shrink-0">
                    <button id="btn-view-covers" onclick="setViewMode('covers')" class="p-1.5 sm:p-2 rounded-lg transition-colors text-neutral-400 hover:text-white" title="Visualização em Capas (Covers)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sm:w-[18px] sm:h-[18px]"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
                    </button>
                    <button id="btn-view-compact" onclick="setViewMode('compact')" class="p-1.5 sm:p-2 rounded-lg transition-colors text-neutral-400 hover:text-white" title="Visualização Compacta (Compact)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sm:w-[18px] sm:h-[18px]"><line x1="8" x1="21" y1="6" y2="6"/><line x1="8" x1="21" y1="12" y2="12"/><line x1="8" x1="21" y1="18" y2="18"/><line x1="3" x1="3.01" y1="6" y2="6"/><line x1="3" x1="3.01" y1="12" y2="12"/><line x1="3" x1="3.01" y1="18" y2="18"/></svg>
                    </button>
                </div>
                
                <div class="relative flex-1 min-w-[110px] max-w-xs sm:w-64">
                    <input type="text" id="search-input" placeholder="Pesquisa" class="w-full bg-neutral-900 border border-neutral-800 text-neutral-300 pl-8 pr-3 py-1.5 sm:py-2 rounded-xl text-xs sm:text-sm focus:outline-none focus:border-emerald-500/50 transition-colors">
                    <div class="absolute inset-y-0 left-0 pl-2.5 flex items-center pointer-events-none text-neutral-500">
                        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sm:w-3.5 sm:h-3.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    </div>
                </div>
            </div>
        </header>

        <!-- Tag de filtro de pesquisa -->
        <div id="search-filter-tag" class="hidden w-full bg-neutral-900 border border-neutral-800 rounded-xl p-3 mb-6 flex items-center justify-between text-xs sm:text-sm font-semibold">
            <div class="flex items-center gap-2 sm:gap-3 flex-wrap text-neutral-400">
                <span>Filtrado por: <span id="search-term-text" class="text-white font-bold">""</span></span>
                <span class="text-neutral-700">|</span>
                <button id="btn-filter-feedly" class="px-3 py-1 rounded-lg border border-emerald-500/30 bg-emerald-500/10 text-emerald-400 font-bold transition-all">
                    Feedly
                </button>
                <button id="btn-filter-steam" class="px-3 py-1 rounded-lg border border-neutral-800 bg-neutral-950 text-neutral-400 hover:text-white transition-all">
                    Steam
                </button>
            </div>
            <button id="btn-clear-search" class="text-neutral-400 hover:text-white px-2 py-1 font-bold text-base transition-colors" title="Limpar busca">
                ✕
            </button>
        </div>

        <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
            <div class="col-span-full text-center py-20 text-emerald-500 animate-pulse">Carregando lançamentos...</div>
        </div>
    </div>

    <div id="modal-overlay" onclick="fecharModalFora(event)" class="fixed inset-0 z-50 bg-black/85 backdrop-blur-md hidden overflow-y-auto">
        <div class="min-h-full w-full flex items-center justify-center p-0 sm:p-6">
            <div id="modal-content" class="bg-neutral-900 border border-neutral-800 w-full max-w-4xl minh-[80vh] sm:rounded-3xl overflow-hidden flex flex-col shadow-2xl relative animate-modal my-0 sm:my-8">
                
                <div id="modal-hero" class="h-48 sm:h-64 w-full bg-neutral-800 bg-cover bg-center relative flex items-end p-8">
                    <div class="absolute inset-0 bg-gradient-to-t via-neutral-900/40 to-transparent"></div>
                    <button onclick="fecharModal()" class="absolute top-4 right-4 bg-black/50 hover:bg-black/80 text-white p-2 rounded-full backdrop-blur-sm z-10">✕</button>
                    <h2 id="modal-title-original" class="text-4xl font-bold text-white relative z-0 game-header-text" style="display:none">Carregando...</h2>
                    <div id="modal-metacritic-score" class="absolute bottom-4 right-4 hidden h-16 w-16 flex items-center justify-center rounded-lg border-2 border-white/20 shadow-xl">
                        <span id="metacritic-score-value" class="text-2xl font-black text-white"></span>
                    </div>
                </div>

                <!-- NOVA BARRA DE ATALHOS RETANGULAR E MINIMALISTA -->
                <nav id="modal-nav-shortcuts" class="w-full bg-neutral-950/95 backdrop-blur-md border-b border-neutral-800 z-40 transition-all duration-300">
                    <div class="flex items-center justify-start sm:justify-center overflow-x-auto no-scrollbar py-2.5 px-3 gap-1.5 sm:gap-2">
                        
                        <button onclick="rolarParaSecaoModal('modal-content')" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-neutral-900 hover:bg-neutral-800 text-neutral-300 hover:text-white text-xs font-bold transition-all shrink-0 border border-neutral-800/80" title="Voltar ao Topo">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><path d="m18 15-6-6-6 6"/></svg>
                            <span>Topo</span>
                        </button>

                        <button id="shortcut-hltb" onclick="rolarParaSecaoModal('modal-section-hltb')" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-neutral-900 hover:bg-neutral-800 text-neutral-300 hover:text-white text-xs font-bold transition-all shrink-0 border border-neutral-800/80 hidden" title="How Long to Beat">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            <span>HLTB</span>
                        </button>

                        <button id="shortcut-descricao" onclick="rolarParaSecaoModal('modal-section-descricao')" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-neutral-900 hover:bg-neutral-800 text-neutral-300 hover:text-white text-xs font-bold transition-all shrink-0 border border-neutral-800/80" title="Descrição">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                            <span>Descrição</span>
                        </button>

                        <button id="shortcut-recursos" onclick="rolarParaSecaoModal('modal-section-recursos')" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-neutral-900 hover:bg-neutral-800 text-neutral-300 hover:text-white text-xs font-bold transition-all shrink-0 border border-neutral-800/80 hidden" title="Recursos">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                            <span>Recursos</span>
                        </button>

                        <button id="shortcut-screenshots" onclick="rolarParaSecaoModal('modal-section-screenshots')" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-neutral-900 hover:bg-neutral-800 text-neutral-300 hover:text-white text-xs font-bold transition-all shrink-0 border border-neutral-800/80 hidden" title="Screenshots">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                            <span>Screenshots</span>
                        </button>

                        <button id="shortcut-videos" onclick="rolarParaSecaoModal('modal-section-videos')" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-neutral-900 hover:bg-neutral-800 text-neutral-300 hover:text-white text-xs font-bold transition-all shrink-0 border border-neutral-800/80 hidden" title="Vídeos">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                            <span>Vídeos</span>
                        </button>

                        <button id="shortcut-reviews" onclick="rolarParaSecaoModal('modal-section-reviews')" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-neutral-900 hover:bg-neutral-800 text-neutral-300 hover:text-white text-xs font-bold transition-all shrink-0 border border-neutral-800/80 hidden" title="Avaliações">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                            <span>Avaliações</span>
                        </button>

                        <button id="shortcut-similares" onclick="rolarParaSecaoModal('modal-section-similares')" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-neutral-900 hover:bg-neutral-800 text-neutral-300 hover:text-white text-xs font-bold transition-all shrink-0 border border-neutral-800/80 hidden" title="Jogos Similares">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><path d="m7 11 2-2-2-2"/><path d="M11 13h4"/><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/></svg>
                            <span>Similares</span>
                        </button>

                        <button id="shortcut-links" onclick="rolarParaSecaoModal('modal-section-links')" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-neutral-900 hover:bg-neutral-800 text-neutral-300 hover:text-white text-xs font-bold transition-all shrink-0 border border-neutral-800/80" title="Links">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                            <span>Links</span>
                        </button>

                        <button id="shortcut-downloads" onclick="rolarParaSecaoModal('modal-section-downloads')" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-neutral-900 hover:bg-neutral-800 text-neutral-300 hover:text-white text-xs font-bold transition-all shrink-0 border border-neutral-800/80" title="Download">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            <span>Download</span>
                        </button>

                        <button onclick="fecharModal()" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-red-500/10 hover:bg-red-500/20 text-red-400 font-bold text-xs transition-all shrink-0 border border-red-500/30 ml-auto" title="Fechar Modal">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                            <span>Fechar</span>
                        </button>

                    </div>
                </nav>

                <div class="p-5 sm:p-8 space-y-7">
                    <div class="flex flex-row items-start gap-4">
                        <div class="w-32 sm:w-32 bg-neutral-950 rounded-lg overflow-hidden shrink-0 border border-neutral-800 shadow-2xl">
                            <img id="modal-cover" src="" class="w-full h-full object-cover">
                        </div>
                        <div class="flex-1 space-y-4">
                            <div class="bg-neutral-950/50 p-4 rounded-xl border border-neutral-800">
                                <h3 id="modal-title-release" class="text-sm font-bold text-white mb-3"></h3>
                                <div id="steam-metadata" class="text-xs text-neutral-400 space-y-1 hidden">
                                    <p id="game-size"></p>
                                    <p id="release-date"></p>
                                    <p id="total-reviews"></p>
                                    <p id="modal-genres"></p>
                                    <p id="modal-developer"></p>
                                </div>
                            </div>
                            <button id="modal-btn-share" type="button" class="inline-flex items-center gap-1.5 bg-emerald-500 hover:bg-emerald-600 text-neutral-950 font-bold text-xs px-4 py-2 rounded-lg transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                                Compartilhar
                            </button>
                        </div>
                    </div>

                    <div id="modal-section-hltb" class="hidden space-y-3">
                        <h4 class="text-xs font-bold text-neutral-400 uppercase tracking-widest border-b border-neutral-800 pb-2 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            How Long to Beat
                        </h4>
                        <div id="modal-hltb-grid" class="bg-neutral-950/60 border border-neutral-800/80 rounded-xl p-4 sm:p-5 space-y-4 shadow-inner"></div>
                    </div>
                    
                    <div id="modal-section-descricao" class="space-y-3">
                        <h4 class="text-xs font-bold text-neutral-400 uppercase tracking-widest border-b border-neutral-800 pb-2">
                            Descrição
                        </h4>
                        <div id="modal-description" class="text-[12px] text-neutral-400 [&_p:my-[15px] [&_img]:my-[15px]"></div>
                    </div>

                    <div id="modal-section-recursos" class="hidden space-y-3">
                        <h4 class="text-xs font-bold text-neutral-400 uppercase tracking-widest border-b border-neutral-800 pb-2">
                            Recursos
                        </h4>
                        <div id="modal-recursos-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-2"></div>
                    </div>

                    <div id="modal-section-screenshots" class="hidden space-y-3">
                        <h4 class="text-xs font-bold text-neutral-400 uppercase tracking-widest border-b border-neutral-800 pb-2">
                            Screenshots
                        </h4>
                        <div id="modal-screenshots-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-4"></div>
                    </div>

                    <div id="modal-section-videos" class="hidden space-y-3">
                        <h4 class="text-xs font-bold text-neutral-400 uppercase tracking-widest border-b border-neutral-800 pb-2">
                            Vídeos
                        </h4>
                        <div id="modal-youtube-container"></div>
                    </div>

                    <div id="modal-section-reviews" class="hidden space-y-3">
                        <h4 class="text-xs font-bold text-neutral-400 uppercase tracking-widest border-b border-neutral-800 pb-2">
                            Avaliações (Steam)
                        </h4>
                        <div id="modal-reviews-list" class="space-y-4"></div>
                    </div>

                    <div id="modal-section-similares" class="hidden space-y-3">
                        <h4 class="text-xs font-bold text-neutral-400 uppercase tracking-widest border-b border-neutral-800 pb-2 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><path d="m7 11 2-2-2-2"/><path d="M11 13h4"/><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/></svg>
                            Jogos Similares
                        </h4>
                        <div id="modal-similares-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
                    </div>

                    <div id="modal-section-links" class="space-y-3 pb-8">
                        <h4 class="text-xs font-bold text-neutral-400 uppercase tracking-widest border-b border-neutral-800 pb-2">
                            Links
                        </h4>
                        <div id="modal-links-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-2"></div>
                    </div>

                    <div id="modal-section-downloads" class="space-y-3 pb-8">
                        <h4 class="text-xs font-bold text-neutral-400 uppercase tracking-widest border-b border-neutral-800 pb-2">
                            Download
                        </h4>
                        <div id="modal-downloads-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="scripts.js"></script>

</body>

</html>
